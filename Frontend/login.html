<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RealTime Chat</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in">

    <!-- Theme Toggle Floating -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 100;">
        <button id="themeToggleBtn" class="theme-toggle" title="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <!-- Auth Form wrapper -->
    <div class="auth-wrapper">
        <div class="auth-card glass-panel scale-up">
            
            <a href="index.html" class="auth-logo" style="text-decoration: none;">
                <i class="fa-brands fa-whatsapp"></i>
                <span>RealTime Chat</span>
            </a>

            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to connect with your friends</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" novalidate>
                
                <!-- Username field -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember Me</span>
                    </label>
                    <a href="#" id="forgotPasswordBtn" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn" class="btn-primary btn-block btn-animate">
                    <span id="btnText">Sign In</span>
                    <span id="btnSpinner" class="spinner" style="display: none;"></span>
                </button>

            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>

        </div>
    </div>

    <!-- Container for dynamic Toast notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Core Logic and Fetch calls -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply theme on load
            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggleBtn').innerHTML = '<i class="fa-solid fa-sun"></i>';
            }

            // Theme toggle button
            document.getElementById('themeToggleBtn').addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('themeToggleBtn').innerHTML = isDark ? 
                    '<i class="fa-solid fa-sun"></i>' : 
                    '<i class="fa-solid fa-moon"></i>';
            });

            // Redirect if already logged in
            if (localStorage.getItem('loggedUser')) {
                window.location.href = 'dashboard.html';
            }

            // Form Submit Listener
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleLogin();
            });

            // Visual check for Forgot Password UI click
            document.getElementById('forgotPasswordBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showToast("Password reset functionality is under maintenance. Contact admin.", "info");
            });
        });
    </script>
</body>
</html>
