<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RealTime Chat</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in">

    <!-- Theme Toggle Floating -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 100;">
        <button id="themeToggleBtn" class="theme-toggle" title="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <!-- Auth Form wrapper -->
    <div class="auth-wrapper">
        <div class="auth-card glass-panel scale-up">
            
            <a href="index.html" class="auth-logo" style="text-decoration: none;">
                <i class="fa-brands fa-whatsapp"></i>
                <span>RealTime Chat</span>
            </a>

            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register to start texting your contacts</p>
            </div>

            <!-- Register Form -->
            <form id="registerForm" novalidate>
                
                <!-- Profile Image Upload Preview -->
                <div class="profile-upload-container">
                    <div class="profile-preview-wrapper">
                        <!-- Default avatar layout using font-awesome icon placeholder converted to canvas/image or default src -->
                        <img id="avatarPreview" class="profile-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='100' height='100'><rect width='100%' height='100%' fill='%23e1e1e1'/><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z' fill='%238696a0'/></svg>" alt="Profile Preview">
                        <label for="profileImage" class="upload-overlay">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" id="profileImage" accept="image/*">
                        </label>
                    </div>
                    <span style="font-size: 0.8rem; color: var(--text-secondary);">Click to upload profile photo</span>
                </div>

                <!-- Full Name field -->
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required autocomplete="name">
                        <i class="fa-solid fa-user-tag"></i>
                    </div>
                </div>

                <!-- Username field -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-control" placeholder="Enter username (lowercase, no spaces)" required autocomplete="username">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <!-- Email field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" placeholder="Enter email address" required autocomplete="email">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required autocomplete="new-password">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="registerBtn" class="btn-primary btn-block btn-animate">
                    <span id="btnText">Sign Up</span>
                    <span id="btnSpinner" class="spinner" style="display: none;"></span>
                </button>

            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>

        </div>
    </div>

    <!-- Container for dynamic Toast notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Core Logic and Fetch calls -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply theme on load
            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggleBtn').innerHTML = '<i class="fa-solid fa-sun"></i>';
            }

            // Theme toggle button
            document.getElementById('themeToggleBtn').addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('themeToggleBtn').innerHTML = isDark ? 
                    '<i class="fa-solid fa-sun"></i>' : 
                    '<i class="fa-solid fa-moon"></i>';
            });

            // Redirect if already logged in
            if (localStorage.getItem('loggedUser')) {
                window.location.href = 'dashboard.html';
            }

            let profileImageBase64 = "";

            // Handle Profile Image upload
            const fileInput = document.getElementById('profileImage');
            const avatarPreview = document.getElementById('avatarPreview');

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    // Check file size (e.g., limit to 2MB)
                    if (file.size > 2 * 1024 * 1024) {
                        showToast("File size too large (max 2MB)", "error");
                        fileInput.value = "";
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        profileImageBase64 = event.target.result;
                        avatarPreview.src = profileImageBase64;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Form Submit Listener
            const form = document.getElementById('registerForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleRegister(profileImageBase64);
            });
        });
    </script>
</body>
</html>
